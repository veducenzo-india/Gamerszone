<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournaments - StreamHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="logo">StreamHub</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="streams.html">Streams</a>
        <a href="tournaments.html">Tournaments</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="login.html" id="login-link">Login / Signup</a>
        <a href="#" id="logout-link" style="display:none;">Logout</a>
    </nav>
</header>

<section class="tournament-section">
    <h1>Select Your Game</h1>
    <div class="game-buttons">
        <button class="game-btn" onclick="showTournaments('freefire')">Free Fire</button>
        <button class="game-btn" onclick="showTournaments('pubg')">PUBG</button>
        <button class="game-btn" onclick="showTournaments('cod')">Call of Duty</button>
    </div>

    <div class="tournament-list" id="tournament-list">
        <p>Select a game to see tournaments and matches.</p>
    </div>
</section>

<footer>
    <p>&copy; 2026 StreamHub. All rights reserved.</p>
</footer>

<script>
const tournamentsData = {
    freefire: [
        { name: "Free Fire Battle Royale", date: "2026-02-10", entry: "$5" },
        { name: "Free Fire Squad Clash", date: "2026-02-15", entry: "$10" }
    ],
    pubg: [
        { name: "PUBG Solo Championship", date: "2026-02-12", entry: "$7" },
        { name: "PUBG Duo Tournament", date: "2026-02-18", entry: "$12" }
    ],
    cod: [
        { name: "Call of Duty Warzone", date: "2026-02-14", entry: "$8" },
        { name: "COD Team Deathmatch", date: "2026-02-20", entry: "$15" }
    ]
};

function showTournaments(game) {
    const listDiv = document.getElementById('tournament-list');
    listDiv.innerHTML = "";
    tournamentsData[game].forEach(tournament => {
        const tourDiv = document.createElement('div');
        tourDiv.className = 'tournament-item';
        tourDiv.innerHTML = `
            <h3>${tournament.name}</h3>
            <p>Date: ${tournament.date}</p>
            <p>Entry Fee: ${tournament.entry}</p>
            <button class="join-btn">Join Tournament</button>
        `;
        listDiv.appendChild(tourDiv);
    });
}

// Login/logout
const loginLink = document.getElementById('login-link');
const logoutLink = document.getElementById('logout-link');
if(localStorage.getItem('loggedIn') === 'true') {
    loginLink.style.display = 'none';
    logoutLink.style.display = 'inline';
}
logoutLink.addEventListener('click', () => {
    localStorage.removeItem('loggedIn');
    window.location.href = 'index.html';
});
</script>
</body>
</html>
